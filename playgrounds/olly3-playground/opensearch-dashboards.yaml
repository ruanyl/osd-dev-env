replicaCount: 1
image:
  repository: "opensearchstaging/opensearch-dashboards"
  tag: "3.5.0"
  pullPolicy: "Always"
config:
  # Default OpenSearch Dashboards configuration from docker image of Dashboards
  opensearch_dashboards.yml:
    opensearchDashboards.dashboardAdmin.users: ["admin"]
    workspace.enabled: true
    data_source.enabled: true
    data_source.hideLocalCluster: true
    contextProvider.enabled: true
    chat.enabled: true
    chat.mlCommonsAgentId: 'ad26kpsBhs-XD9xwvXYl'
    savedObjects.permission.enabled: true
    assistant.enabled: true
    assistant.chat.enabled: false
    opensearch.ignoreVersionMismatch: true
    assistant.next.enabled: true
    assistant.text2viz.enabled: true
    assistant.alertInsight.enabled: true
    assistant.smartAnomalyDetector.enabled: true
    assistant.incontextInsight.enabled: true
    queryEnhancements.queryAssist.summary.enabled: true
    # opensearch_security_analytics.enabled: false
    uiSettings:
      overrides:
        "home:useNewHomePage": true
    investigation.enabled: true
    investigation.agenticFeaturesEnabled: true
    explore.enabled: true
    data_source.ssl.verificationMode: none

# plugins:
#   enabled: true
#   removeList:
#     - investigationDashboards
#   installList:
#     - https://github.com/yyfamazon/dashboards-investigation/releases/download/prompt/investigationDashboards-3.5.0.zip


ingress:
  enabled: true
  ingressClassName: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/security-groups: sg-0f6042abc5948740a
    alb.ingress.kubernetes.io/manage-backend-security-group-rules: "true"
  labels: {}
  hosts:
    - paths:
        - path: /
          backend: {}

